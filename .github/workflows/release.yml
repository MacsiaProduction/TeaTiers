name: Release APK

# On a version tag (vX.Y.Z) build a SIGNED release APK and publish a GitHub Release with the APK +
# its SHA-256 (decision #118: GitHub Releases is the MVP distribution channel; the in-app updater —
# research 17 — verifies a downloaded APK by sha256 + same-signer before installing). The signing
# keystore comes from repo secrets; no secret lives in VCS.
#
# One-time setup — repo Settings -> Secrets and variables -> Actions -> New repository secret:
#   RELEASE_KEYSTORE_BASE64   = base64 of your release keystore, e.g.  base64 -i release.jks | pbcopy
#   RELEASE_KEYSTORE_PASSWORD = keystore password
#   RELEASE_KEY_ALIAS         = key alias
#   RELEASE_KEY_PASSWORD      = key password
# Generate the keystore ONCE and keep it forever:
#   keytool -genkeypair -v -keystore release.jks -alias teatiers -keyalg RSA -keysize 4096 -validity 10000
# Android enforces same-signer on update, so losing this key permanently breaks auto-update for every
# installed user (they'd have to uninstall + reinstall). Back it up offline.
#
# Cutting a release: bump versionCode (monotonic) + versionName in app/build.gradle.kts, commit, then
#   git tag v0.1.1 && git push origin v0.1.1

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-apk:
    name: build signed APK + publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Require a v* tag
        # On a tag push GITHUB_REF_NAME is the tag (v0.1.0); on a manual workflow_dispatch from a
        # branch it's the branch name — which would cut a junk non-version release. Fail fast so a
        # release is only ever a vX.Y.Z tag (the in-app updater assumes that version semantics).
        run: |
          case "$GITHUB_REF_NAME" in
            v[0-9]*) echo "Release ref: $GITHUB_REF_NAME" ;;
            *) echo "::error::Release must be cut from a v* tag, got '$GITHUB_REF_NAME'. Push a tag: git tag v0.1.0 && git push origin v0.1.0"; exit 1 ;;
          esac

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # Provision the Android SDK (sdkmanager + accepted licenses) so AGP can resolve compileSdk 37
      # / build-tools — matches the `app` jobs in ci.yml + osv-scanner.yml; assembleRelease + the
      # apksigner lookup below both depend on it (review 2026-06-19).
      - uses: android-actions/setup-android@v4

      - name: Full check before release (review P1-4)
        # A release must pass the same unit/lint/static-analysis gate as a PR — never publish an APK
        # that wouldn't pass CI. `check` is the JVM unit + lint + schema-export gate, and now includes
        # the Robolectric Room migration test (decision #130 / P1-4) — so a release can't ship a schema
        # bump whose Migration(6, N) isn't proven lossless. No emulator needed.
        working-directory: app
        run: ./gradlew --no-daemon check

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is not set — see this workflow's header for setup."
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "RELEASE_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        working-directory: app
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Stage APK + checksum + verify signature
        run: |
          set -euo pipefail
          apk=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$apk" ]; then echo "::error::no release APK produced"; exit 1; fi
          out="teatiers-${GITHUB_REF_NAME}.apk"
          cp "$apk" "$out"
          sha256sum "$out" | tee "$out.sha256"
          # Fail the release if the APK isn't actually signed (the updater relies on the signer).
          apksigner=$(find "${ANDROID_HOME:-$ANDROID_SDK_ROOT}/build-tools" -name apksigner | sort -V | tail -1)
          "$apksigner" verify --verbose --print-certs "$out"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "teatiers-${GITHUB_REF_NAME}.apk" \
            "teatiers-${GITHUB_REF_NAME}.apk.sha256" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
