name: Publish server image

# Builds the catalog server image on a (native amd64) GitHub runner and pushes it to the
# GitHub Container Registry, ghcr.io/<owner>/teatiers-server (decision #76, task.md). GitHub
# runners are amd64, so this avoids the local cross-arch buildx/podman problem that forced the
# first image to be built on the VM (decision #57). Auth uses the built-in GITHUB_TOKEN, so no
# external registry secret is needed.
#
# Post-merge one-time setup (so the VM can pull anonymously, no token on the box):
#   - make the package public: repo -> Packages -> teatiers-server -> Package settings -> Public.
# Then point the VM at the ghcr ref and `docker compose pull` (see infra/README.md).

on:
  push:
    branches: [main, trunk]
    paths:
      - server/**
      - .github/workflows/publish-image.yml
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag to push (besides latest + the commit sha)."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: build + push to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build + push
        env:
          OWNER: ${{ github.repository_owner }}
          EXTRA_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          # ghcr requires a lowercase owner/namespace.
          owner_lc=$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')
          repo="ghcr.io/${owner_lc}/teatiers-server"
          tags=("${repo}:latest" "${repo}:${GITHUB_SHA::12}")
          [ -n "${EXTRA_TAG}" ] && tags+=("${repo}:${EXTRA_TAG}")
          args=(); for t in "${tags[@]}"; do args+=(-t "$t"); done
          docker build "${args[@]}" server
          for t in "${tags[@]}"; do docker push "$t"; done
          echo "Pushed: ${tags[*]}"
