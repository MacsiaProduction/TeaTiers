name: Publish server image

# Builds the catalog server image on a (native amd64) GitHub runner and pushes it to the
# GitHub Container Registry, ghcr.io/<owner>/teatiers-server (decision #76, task.md). GitHub
# runners are amd64, so this avoids the local cross-arch buildx/podman problem that forced the
# first image to be built on the VM (decision #57). Auth uses the built-in GITHUB_TOKEN, so no
# external registry secret is needed.
#
# Post-merge one-time setup (so the VM can pull anonymously, no token on the box):
#   - make the package public: repo -> Packages -> teatiers-server -> Package settings -> Public.
# Then point the VM at the ghcr ref and `docker compose pull` (see infra/README.md).

on:
  push:
    branches: [main, trunk]
    paths:
      - server/**
      - .github/workflows/publish-image.yml
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag to push (besides latest + the commit sha)."
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing + provenance attestation (OIDC)
  attestations: write # SLSA build-provenance attestation pushed to the registry

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: build + push to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build + push
        id: push
        env:
          OWNER: ${{ github.repository_owner }}
          EXTRA_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          # ghcr requires a lowercase owner/namespace.
          owner_lc=$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')
          repo="ghcr.io/${owner_lc}/teatiers-server"
          tags=("${repo}:latest" "${repo}:${GITHUB_SHA::12}")
          [ -n "${EXTRA_TAG}" ] && tags+=("${repo}:${EXTRA_TAG}")
          args=(); for t in "${tags[@]}"; do args+=(-t "$t"); done
          docker build "${args[@]}" server
          for t in "${tags[@]}"; do docker push "$t"; done
          # The immutable digest is the supply-chain anchor: sign + attest it, and deploy by it
          # (or by the :${GITHUB_SHA::12} tag) rather than mutable :latest (review 2026-06-19).
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "${repo}:latest" | cut -d@ -f2)
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Pushed: ${tags[*]} @ ${digest}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, Sigstore)
        env:
          COSIGN_YES: "true"
        run: cosign sign "${{ steps.push.outputs.repo }}@${{ steps.push.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.push.outputs.repo }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
