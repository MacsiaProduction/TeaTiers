name: Publish server image

# Builds the catalog server image on a (native amd64) runner and pushes it to Yandex
# Container Registry. GitHub runners are amd64, so this avoids the local cross-arch
# buildx/podman problem that forced the first image to be built on the VM (decision #57).
#
# Inert until two repo settings exist (Settings -> Secrets and variables -> Actions):
#   - secret YC_SA_KEY        : JSON key of a service account with container-registry.images.pusher
#   - variable YC_REGISTRY_ID : the Container Registry id (tofu output -raw registry_id)
# Without them the job no-ops with a notice, so main never goes red.

on:
  push:
    branches: [main, trunk]
    paths:
      - server/**
      - .github/workflows/publish-image.yml
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag to push (besides latest + the commit sha)."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: build + push to YCR
    runs-on: ubuntu-latest
    steps:
      - name: Gate on credentials
        id: gate
        env:
          YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
          YC_REGISTRY_ID: ${{ vars.YC_REGISTRY_ID }}
        run: |
          if [ -z "$YC_SA_KEY" ] || [ -z "$YC_REGISTRY_ID" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::YC_SA_KEY secret and/or YC_REGISTRY_ID variable not set; skipping image publish."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v6

      - name: Log in to Container Registry
        if: steps.gate.outputs.enabled == 'true'
        env:
          YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
        run: printf '%s' "$YC_SA_KEY" | docker login --username json_key --password-stdin cr.yandex

      - name: Build + push
        if: steps.gate.outputs.enabled == 'true'
        env:
          REG: ${{ vars.YC_REGISTRY_ID }}
          EXTRA_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          repo="cr.yandex/${REG}/teatiers-server"
          tags=("${repo}:latest" "${repo}:${GITHUB_SHA::12}")
          [ -n "${EXTRA_TAG}" ] && tags+=("${repo}:${EXTRA_TAG}")
          args=(); for t in "${tags[@]}"; do args+=(-t "$t"); done
          docker build "${args[@]}" server
          for t in "${tags[@]}"; do docker push "$t"; done
          echo "Pushed: ${tags[*]}"
