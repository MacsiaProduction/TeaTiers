# Backend catalog service + self-hosted PostgreSQL (M2). The same stack runs locally and on the
# Yandex Cloud VM (context/decisions.md #18, run 05). Credentials come from the environment / a
# local .env file (rule 50-secure: never commit secrets); the defaults below are dev-only and
# match server/src/main/resources/application.yml.
services:
  db:
    # 16-alpine matches the Testcontainers image the integration tests run against.
    image: postgres:16-alpine
    container_name: teatiers-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teatiers}
      POSTGRES_USER: ${POSTGRES_USER:-teatiers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teatiers}
    volumes:
      - teatiers-pgdata:/var/lib/postgresql/data
    # No published ports: only the server (on the compose network) needs the DB.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teatiers} -d ${POSTGRES_DB:-teatiers}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: teatiers/server:dev
    container_name: teatiers-server
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Bind to localhost only — the dev server need not be reachable from the LAN (decision #98).
      - "127.0.0.1:8080:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"
      SPRING_PROFILES_ACTIVE: default
      # Flyway migrates + Hibernate validates against this DB on startup.
      POSTGRES_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-teatiers}
      POSTGRES_USER: ${POSTGRES_USER:-teatiers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teatiers}
      # OCR tier off unless you point it at the sidecar below (start with `--profile ocr`):
      #   TEATIERS_OCR_SIDECAR_URL=http://ocr-sidecar:8099 docker compose --profile ocr up
      TEATIERS_OCR_SIDECAR_URL: ${TEATIERS_OCR_SIDECAR_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      # First boot runs Flyway + seeding, so allow a generous grace window.
      start_period: 40s
    restart: unless-stopped

  # OCR sidecar — opt-in (`--profile ocr`) so the default dev stack stays light. Built locally;
  # the same image runs in prod (infra/deploy). See ocr-sidecar/README.md.
  ocr-sidecar:
    profiles: ["ocr"]
    build:
      context: ./ocr-sidecar
      dockerfile: Dockerfile
    image: teatiers/ocr-sidecar:dev
    container_name: teatiers-ocr-sidecar
    # Bind to localhost only, for direct poking; the server reaches it over the compose network.
    ports:
      - "127.0.0.1:8099:8099"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8099/health',timeout=2).status==200 else 1)"
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  teatiers-pgdata:
