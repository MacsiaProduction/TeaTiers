# Production stack on the VM: Caddy (TLS) -> server -> self-hosted Postgres. Rendered/placed by
# cloud-init at /opt/teatiers/docker-compose.yml; values come from /opt/teatiers/.env. Unlike the
# repo-root dev compose, the server image is pulled from Container Registry (not built here) and
# the only published ports are Caddy's 80/443.
# Base images pinned by multi-arch index digest (rule 40-devops); tags kept for readability.
# Refresh with: docker manifest inspect --verbose <image> | jq '.[0].Descriptor.digest'
#
# Privilege hardening (decision #102): every service drops all Linux capabilities and runs with
# no-new-privileges; only the caps a service genuinely needs are added back (Caddy: bind 80/443;
# Postgres: the official entrypoint's first-boot chown + gosu user-switch). pids_limit caps fork
# bombs; mem_limit bounds every service on the 4 GB VM (cpus deferred to the sidecar PR, which
# does the measured arithmetic — decision #100). The stateless server runs read-only with a tmpfs
# /tmp (JVM perfdata + Spring's multipart spill). This lands BEFORE the FastAPI/onnxruntime OCR
# sidecar, which processes attacker-supplied images on the same host.

# Bound container log growth on the single 4 GB VM (OPS-P1-3): the default json-file driver grows
# unbounded and can fill the disk. Cap each service at 3 × 10 MB rotated files. Applied to every
# service below via the `*default-logging` alias.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2-alpine@sha256:4679412ccd2114dca9f3017e2c460f76c9d8eb9e1850e72fb9ecda672e05c629
    container_name: teatiers-caddy
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # Wait for the server's actuator/health, not just process start, so a post-reboot Caddy never
    # proxies to a not-yet-migrated server (502s) — decision #102.
    depends_on:
      server:
        condition: service_healthy
    mem_limit: 128m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE # bind the privileged 80/443; certs/config live on the writable volumes
    networks:
      - edge

  server:
    image: ${SERVER_IMAGE}
    container_name: teatiers-server
    restart: unless-stopped
    logging: *default-logging
    # Cap heap well under the 4 GB host so Postgres + Caddy + OS have headroom.
    mem_limit: 1500m
    pids_limit: 512 # JVM: Tomcat worker pool (≤200) + GC/JIT/internal threads, with headroom
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65.0"
      SPRING_PROFILES_ACTIVE: default
      POSTGRES_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # OCR tier (slice 1b): the private sidecar URL. Unset -> tier degrades to 503. The server does
      # NOT depend_on the sidecar — OCR fails closed (502) so the catalog stays up if it's down.
      TEATIERS_OCR_SIDECAR_URL: http://ocr-sidecar:8099
    # Stateless JRE (runs as non-root appuser, uid 10001): lock the root FS read-only and give it a
    # writable tmpfs /tmp for JVM hsperfdata + Spring's multipart spill (max-file-size 8MB). tmpfs
    # pages count against mem_limit, so they can't grow past the container's bound.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL # listens on the high port 8080 as non-root; needs no capabilities
    # The server bridges all three nets: edge (Caddy + its own outbound to Wikidata/Yandex/ACME),
    # data (Postgres), ocr (sidecar). It's the only path between the public edge and the internal nets.
    networks:
      - edge
      - data
      - ocr
    # Ported from the dev compose so Caddy can gate on readiness (curl ships in the runtime image).
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      # First boot runs Flyway + seeding, so allow a generous grace window.
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine@sha256:79950da386bda7fcc9d57aa9aa9be6c6d7407596a9b8f68014b09a778a9ab316
    container_name: teatiers-db
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 768m
    pids_limit: 256 # one backend process per connection (max_connections 100) + bg workers
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - teatiers_pgdata:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # The official postgres entrypoint starts as root to fix the data-dir ownership, then drops to
    # the postgres user via gosu — keep only those caps (chown/perms + setuid/setgid). Postgres
    # itself runs unprivileged thereafter; no-new-privileges still blocks setuid-binary escalation.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    networks:
      - data # internal-only net (no internet); reachable only by the server
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # RapidOCR sidecar (slice 1b): runs the ONNX OCR for the server's /teas/ocr. Private network only,
  # never published. Footprint measured at ~250 MB RSS (decision #105) — the cpus/mem caps are the
  # "measured arithmetic" #102 deferred here: 1g/1.5cpu fits the 4 GB / 2 vCPU VM with headroom.
  ocr-sidecar:
    image: ${OCR_SIDECAR_IMAGE}
    container_name: teatiers-ocr-sidecar
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1g
    cpus: 1.5 # bursty inference (intra_op=2); bounded so it can't starve db/server
    pids_limit: 128
    # Stateless (non-root appuser, uid 10001); models are baked in, so the root FS is read-only with
    # a writable tmpfs /tmp for FastAPI's multipart spill.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL # listens on high port 8099 as non-root; no capabilities needed
    # ocr is an internal-only net: the sidecar (the largest RCE surface — it decodes attacker-supplied
    # images) has NO route to Postgres (not on the data net) and NO internet egress (models are baked,
    # it needs none). Defense-in-depth matching the threat model (review F3/F5, decision #109).
    networks:
      - ocr
    # python:3.14-slim has no curl — probe /health with the stdlib instead.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8099/health',timeout=2).status==200 else 1)"
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 40s # model load + warmup

# Network segmentation (decision #109, review F3/F5): the server is the only multi-homed service.
# `data` and `ocr` are `internal: true` — no gateway, so neither Postgres nor the image-processing
# sidecar can reach the internet, and the sidecar can't reach Postgres. `edge` carries Caddy ingress
# + the server's legitimate outbound (Wikidata / Yandex FM / ACME).
networks:
  edge:
  data:
    internal: true
  ocr:
    internal: true

volumes:
  caddy_data:
  caddy_config:
  teatiers_pgdata:
