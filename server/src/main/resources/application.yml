spring:
  application:
    name: teatiers-catalog

  # Production must override credentials via env (rule 50-secure: no secrets in VCS).
  # The defaults below are local-dev only and match the docker-compose Postgres.
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/teatiers}
    username: ${POSTGRES_USER:teatiers}
    password: ${POSTGRES_PASSWORD:teatiers}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway is the single source of truth for the schema; Hibernate only validates.
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      # Map java.time.Instant to TIMESTAMP WITH TIME ZONE so validate matches the timestamptz columns.
      hibernate.type.preferred_instant_jdbc_type: TIMESTAMP_WITH_TIMEZONE

  flyway:
    enabled: true

  # Render Spring MVC's built-in exceptions (404/405/unsupported media type, etc.) as
  # RFC-7807 problem+json, matching the catalog advice.
  mvc:
    problemdetails:
      enabled: true

server:
  port: 8080

# TeaTiers catalog options.
teatiers:
  seed:
    # Load the curated catalog seed on startup (idempotent). Disabled in integration tests.
    enabled: true
  resolve:
    # Per-client (forwarded IP) fixed-window cap for POST /resolve; protects the Wikidata/LLM budget.
    rate-per-minute: 20
  wikidata:
    # First (free, CC0) enrichment tier. Override the User-Agent per deployment to satisfy the
    # Wikimedia UA policy (descriptive agent + contact). Set enabled=false to skip the network tier.
    enabled: true
    endpoint: https://query.wikidata.org/sparql
    user-agent: "TeaTiers/0.1 (+https://github.com/macsia/TeaTiers) catalog-resolver"
    connect-timeout-ms: 3000
    read-timeout-ms: 8000

# Expose only the health endpoint for compose/systemd liveness & readiness probes.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
