spring:
  application:
    name: teatiers-catalog

  # Production must override credentials via env (rule 50-secure: no secrets in VCS).
  # The defaults below are local-dev only and match the docker-compose Postgres.
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/teatiers}
    username: ${POSTGRES_USER:teatiers}
    password: ${POSTGRES_PASSWORD:teatiers}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway is the single source of truth for the schema; Hibernate only validates.
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      # Map java.time.Instant to TIMESTAMP WITH TIME ZONE so validate matches the timestamptz columns.
      hibernate.type.preferred_instant_jdbc_type: TIMESTAMP_WITH_TIMEZONE

  flyway:
    enabled: true

  # Render Spring MVC's built-in exceptions (404/405/unsupported media type, etc.) as
  # RFC-7807 problem+json, matching the catalog advice.
  mvc:
    problemdetails:
      enabled: true

  # Framework-level bound on /teas/ocr image uploads (the controller also checks teatiers.ocr.max-image-bytes).
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 9MB

server:
  port: 8080

# TeaTiers catalog options.
teatiers:
  seed:
    # Load the curated catalog seed on startup (idempotent). Disabled in integration tests.
    enabled: true
  resolve:
    # Per-client (forwarded IP) fixed-window cap for POST /resolve; protects the Wikidata/LLM budget.
    rate-per-minute: 20
  wikidata:
    # First (free, CC0) enrichment tier. Override the User-Agent per deployment to satisfy the
    # Wikimedia UA policy (descriptive agent + contact). Set enabled=false to skip the network tier.
    enabled: true
    endpoint: https://query.wikidata.org/sparql
    user-agent: "TeaTiers/0.1 (+https://github.com/macsia/TeaTiers) catalog-resolver"
    connect-timeout-ms: 3000
    read-timeout-ms: 8000
  llm:
    # Second (paid) enrichment tier: flavor profile + RU blurb on a Wikidata miss (plan.md section 6
    # step 3, decision #65). Key comes from env (Lockbox teatiers-llm-api-key) — never in VCS. Blank
    # key OR enabled=false => the tier is off and a miss returns UNRESOLVED.
    enabled: true
    endpoint: https://llm.api.cloud.yandex.net/v1/chat/completions
    folder-id: ${YC_FOLDER_ID:}
    api-key: ${TEATIERS_LLM_API_KEY:}
    primary-model: aliceai-llm-flash
    booster-model: qwen3-235b-a22b-fp8/latest
    temperature: 0
    max-tokens: 1800
    connect-timeout-ms: 3000
    read-timeout-ms: 30000
    max-attempts: 2
    # Global daily cap on enrichment LLM calls across all callers (cost protection). Once hit, a
    # Wikidata miss fails closed to UNRESOLVED until UTC midnight. <= 0 disables the ceiling.
    daily-call-cap: 200
  ocr:
    # OCR tier (research run 10, decision #96): proxy a scanned packaging photo to a local RapidOCR
    # sidecar (ru+en) and return text for review (#25). sidecar-url is injected at deploy time; blank
    # OR enabled=false => /teas/ocr returns 503. Image is processed in memory, never stored.
    enabled: true
    sidecar-url: ${TEATIERS_OCR_SIDECAR_URL:}
    max-image-bytes: 8388608
    max-text-length: 4000
    connect-timeout-ms: 3000
    read-timeout-ms: 20000
    # Own per-client window, separate from resolve.rate-per-minute; lower because a scan runs
    # sidecar inference (heavier than a Wikidata/cache hit).
    rate-per-minute: 10

# Expose only the health endpoint for compose/systemd liveness & readiness probes.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
